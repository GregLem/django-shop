<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
    <div class="cont">
        <h1>Вход в систему</h1>
        
        {% if form.errors %}
            <p>Имя или пароль неверны</p>
        {% endif %}

        <form method='post' action="{% url 'login' %}">
            {% csrf_token %}
            <div>
                <label for="{{ form.username.id_for_label }}">
                    Имя пользователя:
                </label>
                {{ form.username }}
            </div>
            <div>
                <label for="{{ form.password.id_for_label }}">
                    ??? ????????????:
                </label>
                {{ form.password }}
            </div>
            <button type="submit">Войти</button>
        </form>

        <p>
            <a href="{% url 'signup' %}">
                Регистрация
            </a>
        </p>
            
    </div>
</body>
</html>
